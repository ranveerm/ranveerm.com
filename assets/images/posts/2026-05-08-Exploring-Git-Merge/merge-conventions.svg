<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 270" role="img" aria-label="A main branch merging a feature branch through a merge commit M, with HEAD pointing to main">
  <style>
    :root {
      --g-ink: #3A3A3D;
      --g-acc: #C96442;
      --g-paper: #F3F1EC;
      --g-raised: #FFFFFF;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --g-ink: #D9D9DE;
        --g-acc: #E8957A;
        --g-paper: #36363A;
        --g-raised: #2F2F33;
      }
    }
    text { font-family: 'SFMono-Regular', Menlo, monospace; }
  </style>

  <!-- Main trunk edges (INK): a1-b2, b2-c3, c3-d4, d4-M -->
  <path d="M 76 120 L 124 120" stroke="var(--g-ink)" stroke-width="1.5" fill="none"/>
  <path d="M 156 120 L 204 120" stroke="var(--g-ink)" stroke-width="1.5" fill="none"/>
  <path d="M 236 120 L 284 120" stroke="var(--g-ink)" stroke-width="1.5" fill="none"/>
  <path d="M 316 120 L 364 120" stroke="var(--g-ink)" stroke-width="1.5" fill="none"/>

  <!-- Feature branch edges (ACC): b2->f6 curve, f6-g7, g7->M curve -->
  <path d="M 156 120 C 178 120, 182 200, 204 200" stroke="var(--g-acc)" stroke-width="1.5" fill="none"/>
  <path d="M 236 200 L 284 200" stroke="var(--g-acc)" stroke-width="1.5" fill="none"/>
  <path d="M 316 200 C 338 200, 342 120, 364 120" stroke="var(--g-acc)" stroke-width="1.5" fill="none"/>

  <!-- Commits on main row (y=120) -->
  <circle cx="60"  cy="120" r="16" fill="var(--g-paper)" stroke="var(--g-ink)" stroke-width="1.5"/>
  <text x="60"  y="125" text-anchor="middle" font-size="14" font-weight="600" fill="var(--g-ink)">a1</text>

  <circle cx="140" cy="120" r="16" fill="var(--g-paper)" stroke="var(--g-ink)" stroke-width="1.5"/>
  <text x="140" y="125" text-anchor="middle" font-size="14" font-weight="600" fill="var(--g-ink)">b2</text>

  <circle cx="220" cy="120" r="16" fill="var(--g-paper)" stroke="var(--g-ink)" stroke-width="1.5"/>
  <text x="220" y="125" text-anchor="middle" font-size="14" font-weight="600" fill="var(--g-ink)">c3</text>

  <circle cx="300" cy="120" r="16" fill="var(--g-paper)" stroke="var(--g-ink)" stroke-width="1.5"/>
  <text x="300" y="125" text-anchor="middle" font-size="14" font-weight="600" fill="var(--g-ink)">d4</text>

  <!-- Commits on feature row (y=200) -->
  <circle cx="220" cy="200" r="16" fill="var(--g-paper)" stroke="var(--g-acc)" stroke-width="1.5"/>
  <text x="220" y="205" text-anchor="middle" font-size="14" font-weight="600" fill="var(--g-acc)">f6</text>

  <circle cx="300" cy="200" r="16" fill="var(--g-paper)" stroke="var(--g-acc)" stroke-width="1.5"/>
  <text x="300" y="205" text-anchor="middle" font-size="14" font-weight="600" fill="var(--g-acc)">g7</text>

  <!-- Merge commit M (ACC outline, paper fill) -->
  <circle cx="380" cy="120" r="16" fill="var(--g-paper)" stroke="var(--g-acc)" stroke-width="1.5"/>
  <text x="380" y="125" text-anchor="middle" font-size="14" font-weight="600" fill="var(--g-acc)">M</text>

  <!-- Branch pointer "main" stacked above M, INK colour chain.
       Branch rect: y=60..80. Arrow tip at commit equator (y=104), gap 4px. -->
  <line x1="380" y1="80" x2="380" y2="94" stroke="var(--g-ink)" stroke-width="2.2"/>
  <polygon points="380,100 374,94 386,94" fill="var(--g-ink)"/>
  <rect x="348" y="60" width="64" height="20" rx="3" fill="var(--g-raised)" stroke="var(--g-ink)" stroke-width="1.5"/>
  <text x="380" y="74" text-anchor="middle" font-size="10" font-weight="600" fill="var(--g-ink)">main</text>

  <!-- HEAD pointer further above "main".
       HEAD rect: y=18..38. Arrow tip at branch-top (y=56), gap 4px. -->
  <line x1="380" y1="38" x2="380" y2="50" stroke="var(--g-ink)" stroke-width="2.2"/>
  <polygon points="380,56 374,50 386,50" fill="var(--g-ink)"/>
  <rect x="348" y="18" width="64" height="20" rx="3" fill="var(--g-ink)"/>
  <text x="380" y="32" text-anchor="middle" font-size="11" font-weight="700" fill="var(--g-raised)" letter-spacing="0.5">HEAD</text>

  <!-- Branch pointer "feature" stacked below g7, ACC colour.
       Branch rect: y=240..260. Arrow tip at commit equator (y=220), gap 4px. -->
  <line x1="300" y1="240" x2="300" y2="226" stroke="var(--g-acc)" stroke-width="2.2"/>
  <polygon points="300,220 294,226 306,226" fill="var(--g-acc)"/>
  <rect x="268" y="240" width="64" height="20" rx="3" fill="var(--g-raised)" stroke="var(--g-acc)" stroke-width="1.5"/>
  <text x="300" y="254" text-anchor="middle" font-size="10" font-weight="600" fill="var(--g-acc)">feature</text>
</svg>
