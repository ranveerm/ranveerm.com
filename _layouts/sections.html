---
layout: default
---

<link
  href="https://maxcdn.bootstrapcdn.com/font-awesome/4.6.3/css/font-awesome.min.css"
  rel="stylesheet"
/>

<style>
  /*
   * Visual overview shown under Year-in-Review posts. Duplicated from
   * home.html styles so the sections view renders thumbnails identically.
   */
  .yir-overview {
    margin: 0.6rem 0 0.2rem;
    display: flex;
    flex-direction: column;
    gap: 0.35rem;
  }
  .yir-overview-row {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    min-height: 28px;
  }
  .yir-overview-icon {
    flex: 0 0 18px;
    width: 18px;
    text-align: center;
    color: var(--ink-muted);
    font-size: 0.95rem;
  }
  .yir-overview-thumbs {
    display: flex;
    flex-wrap: wrap;
    gap: 3px;
    flex: 1;
    min-width: 0;
  }
  .yir-overview-thumb {
    height: 28px;
    width: auto;
    max-width: 28px;
    object-fit: cover;
    border-radius: 3px;
    opacity: 0.85;
    box-shadow: 0 1px 2px rgba(0, 0, 0, 0.08);
  }

  /* Unified search bar -- pill-shaped on its own, rounded-square when
     selected-tag chips wrap inside it. */
  .search-bar {
    display: flex;
    flex-direction: column;
    background: transparent;
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 9px 16px;
    margin-top: 1rem;
    margin-bottom: 0.75rem;
    transition: border-radius 160ms ease, padding 160ms ease, border-color 0.2s ease;
  }
  .search-bar.has-chips {
    border-radius: 18px;
    padding: 11px 14px 12px 16px;
  }
  .search-bar:focus-within {
    border-color: var(--ink-muted);
  }
  .search-bar-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .search-bar-icon {
    flex: 0 0 auto;
    color: var(--ink-muted);
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .search-bar-input {
    flex: 1 1 auto;
    min-width: 0;
    background: transparent;
    border: none;
    outline: none;
    padding: 2px 0;
    color: var(--ink-primary);
    font-family: var(--font-display);
    font-size: var(--size-md);
    letter-spacing: -0.005em;
    line-height: 1.3;
  }
  .search-bar-input::placeholder { color: var(--ink-muted); }

  .tag-header {
    display: flex;
    align-items: baseline;
    gap: 0.5rem;
    flex-wrap: wrap;
    margin-bottom: 1rem;
  }
  .tag-header h2 { margin: 0; }
  .selected-tags {
    display: none;
    align-items: center;
    flex-wrap: wrap;
    gap: 0.4rem;
    margin-top: 9px;
    padding-left: 25px;
  }
  .search-bar.has-chips .selected-tags { display: flex; }

  @media (max-width: 600px) {
    .search-bar { padding: 8px 14px; }
    .search-bar.has-chips { padding: 10px 12px 11px; border-radius: 16px; }
    .selected-tags { margin-top: 8px; padding-left: 24px; }
  }

  .tag-pool {
    margin-bottom: 0;
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
  }
  .tag-pool + hr.post-divider {
    margin-top: 0.75rem;
  }
  .post-tag {
    cursor: pointer;
    transition: background 0.2s ease, color 0.2s ease, transform 0.15s ease;
  }
  .post-tag.selected {
    background: var(--coral);
    color: var(--paper-raised);
    border-color: var(--coral);
  }
  .post-tag.selected:before {
    background: var(--paper-raised);
    opacity: 1;
  }
  .post-tag.selected:hover {
    background: var(--coral);
    color: var(--paper-raised);
    border-color: var(--coral);
    opacity: 0.82;
  }
  .post-tag.selected:hover:before {
    content: "";
    background:
      linear-gradient(45deg,  transparent 42%, var(--paper-raised) 42%, var(--paper-raised) 58%, transparent 58%),
      linear-gradient(-45deg, transparent 42%, var(--paper-raised) 42%, var(--paper-raised) 58%, transparent 58%);
    background-size: 100% 100%;
    background-color: transparent;
    width: 6px;
    height: 6px;
    border-radius: 0;
    opacity: 1;
  }
  .post-tag.animating {
    transform: scale(0.9);
    opacity: 0.7;
  }

  .filtered-posts { margin-top: 1rem; }

  .pagination {
    display: flex;
    gap: 0.5rem;
    justify-content: center;
    margin-top: 2rem;
    flex-wrap: wrap;
  }
  .pagination button {
    padding: 0.25rem 0.75rem;
    border: 1px solid var(--line);
    background: transparent;
    border-radius: 999px;
    color: var(--ink-muted);
    cursor: pointer;
    font-family: var(--font-text);
    font-size: var(--size-smd);
  }
  .pagination button.active {
    background: var(--coral);
    color: var(--paper-raised);
    border-color: var(--coral);
  }
  .pagination button:hover:not(.active) {
    color: var(--ink-primary);
    border-color: var(--ink-primary);
  }
  .no-results {
    color: var(--ink-muted);
    font-family: var(--font-display);
    font-size: var(--size-md);
    font-style: italic;
    margin-top: 1rem;
  }
</style>

<!-- Unified search bar: free-text input + selected-tag chips inside -->
<div class="search-bar" id="search-bar">
  <div class="search-bar-row">
    <span class="search-bar-icon" aria-hidden="true">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="7"/>
        <path d="m20 20-3.5-3.5"/>
      </svg>
    </span>
    <input id="search-input" class="search-bar-input" type="text"
           placeholder="Search content..." aria-label="Search content">
  </div>
  <div class="selected-tags" id="selected-tags"></div>
</div>

<!-- Tag pool (unselected tags) -->
{% assign sortedTags = site.tags | sort %}
<div class="tag-pool" id="tag-pool">
  {% for tag in sortedTags %}
  <a class="post-tag" data-tag="{{ tag[0] }}" onclick="toggleTag(this)">{{ tag[0] }}</a>
  {% endfor %}
</div>

<hr class="post-divider">

<!-- Filtered posts container -->
<div class="filtered-posts" id="filtered-posts"></div>

<!-- Pagination -->
<div class="pagination" id="pagination"></div>

<script>
  // Build post data from Jekyll at build time. We pre-render the
  // Year-in-Review category overview server-side (since it depends on
  // `_data/year-in-review/...`) and ship it as an HTML blob per post,
  // so the client-side filter can stamp it out without re-reading data.
  var allPosts = [
    {% for post in site.posts %}
    {%- assign excerptParts = post.excerpt | split: "<!-- excerpt-start -->" -%}
    {%- capture yir_html -%}
    {%- if post.image-assets-dir contains "/year-in-review/" -%}
      {%- assign yir_parts = post.image-assets-dir | split: "/" -%}
      {%- assign yir_year = yir_parts | last -%}
      {%- assign yir_key = "year-" | append: yir_year -%}
      {%- assign yir_data = site.data.year-in-review[yir_key] -%}
      {%- if yir_data -%}
      <div class="yir-overview">
        {%- assign yir_sections = "Books-processed,fa-book|Movies-processed,fa-film|TV-shows-processed,fa-television|Games-processed,fa-gamepad|Beverages-processed,fa-beer" | split: "|" -%}
        {%- for section in yir_sections -%}
          {%- assign pair = section | split: "," -%}
          {%- assign key = pair[0] -%}
          {%- assign icon = pair[1] -%}
          {%- assign cat = yir_data[key] -%}
          {%- if cat and cat.entries.size > 0 -%}
          <div class="yir-overview-row"><i class="fa {{ icon }} yir-overview-icon" aria-hidden="true"></i><div class="yir-overview-thumbs">
            {%- for entry in cat.entries -%}
              {%- if entry.photo and entry.photo != "" -%}
              <img class="yir-overview-thumb" loading="lazy" src="{{ post.image-assets-dir }}/day-one-exports/{{ entry.photo }}" alt="{{ entry.title | escape }}" title="{{ entry.title | escape }}">
              {%- endif -%}
            {%- endfor -%}
          </div></div>
          {%- endif -%}
        {%- endfor -%}
      </div>
      {%- endif -%}
    {%- endif -%}
    {%- endcapture -%}
    {
      title: {{ post.title | jsonify }},
      url: {{ post.url | relative_url | jsonify }},
      date: {{ post.date | date: "%b %-d, %Y" | jsonify }},
      tags: {{ post.tags | jsonify }},
      excerpt: {{ excerptParts[1] | default: post.excerpt | strip_newlines | strip_html | truncatewords: 50 | jsonify }},
      yirHtml: {{ yir_html | strip_newlines | jsonify }}
    }{% unless forloop.last %},{% endunless %}
    {% endfor %}
  ];

  var selectedTags = [];
  var currentPage = 1;
  var postsPerPage = 10;

  function toggleTag(el) {
    var tag = el.getAttribute('data-tag');
    var idx = selectedTags.indexOf(tag);

    // Brief animation
    el.classList.add('animating');
    setTimeout(function() { el.classList.remove('animating'); }, 150);

    if (idx === -1) {
      // Select: move into the search bar's chip slot
      selectedTags.push(tag);
      el.classList.add('selected');
      document.getElementById('selected-tags').appendChild(el);
    } else {
      // Deselect: move back to pool in sorted position
      selectedTags.splice(idx, 1);
      el.classList.remove('selected');
      insertSorted(el);
    }

    updateSearchBarState();
    currentPage = 1;
    renderPosts();
  }

  function updateSearchBarState() {
    var bar = document.getElementById('search-bar');
    if (selectedTags.length > 0) bar.classList.add('has-chips');
    else bar.classList.remove('has-chips');
  }

  function getQuery() {
    var input = document.getElementById('search-input');
    return (input && input.value || '').trim().toLowerCase();
  }

  function insertSorted(el) {
    var pool = document.getElementById('tag-pool');
    var children = pool.querySelectorAll('.post-tag');
    var tag = el.getAttribute('data-tag').toLowerCase();
    var inserted = false;

    for (var i = 0; i < children.length; i++) {
      if (children[i].getAttribute('data-tag').toLowerCase() > tag) {
        pool.insertBefore(el, children[i]);
        inserted = true;
        break;
      }
    }
    if (!inserted) {
      pool.appendChild(el);
    }
  }

  function getFilteredPosts() {
    var q = getQuery();
    if (selectedTags.length === 0 && !q) return [];
    return allPosts.filter(function(post) {
      var matchTags = selectedTags.length === 0 || post.tags.some(function(t) {
        return selectedTags.indexOf(t) !== -1;
      });
      var matchQuery = !q || (post.title || '').toLowerCase().indexOf(q) !== -1;
      return matchTags && matchQuery;
    });
  }

  function renderPosts() {
    var filtered = getFilteredPosts();
    var container = document.getElementById('filtered-posts');
    var totalPages = Math.ceil(filtered.length / postsPerPage);

    if (currentPage > totalPages) currentPage = totalPages || 1;

    var start = (currentPage - 1) * postsPerPage;
    var pagePosts = filtered.slice(start, start + postsPerPage);

    if (pagePosts.length === 0) {
      var hasFilter = selectedTags.length > 0 || getQuery().length > 0;
      container.innerHTML = hasFilter ? '<p class="no-results">No posts match the current filter.</p>' : '';
      document.getElementById('pagination').innerHTML = '';
      return;
    }

    // Mirror the home page's typographic stream: two-column grid, pill
    // tags, "Continue reading" link, and the Year-in-Review thumbnail
    // overview where applicable. Divider comes from <li> border-bottom
    // (defined in _theme.scss) so we don't emit <hr> between entries.
    var html = '<ul class="post-list post-stream">';
    pagePosts.forEach(function(post) {
      var tagsHtml = '';
      if (post.tags && post.tags.length > 0) {
        tagsHtml = '<div class="post-stream-tags">' + post.tags.map(function(tag) {
          return '<a class="post-tag" href="/sections/?tag=' +
                 encodeURIComponent(tag) + '">' + escapeHtml(tag) + '</a>';
        }).join('') + '</div>';
      }
      html +=
        '<li>' +
          '<div class="post-stream-date"><time>' + post.date + '</time></div>' +
          '<div class="post-stream-body">' +
            '<h3 class="post-stream-title">' +
              '<a href="' + post.url + '">' + escapeHtml(post.title) + '</a>' +
            '</h3>' +
            tagsHtml +
            '<div class="post-stream-excerpt">' + post.excerpt + '</div>' +
            (post.yirHtml || '') +
            '<a class="post-stream-more" href="' + post.url + '">Continue reading &rarr;</a>' +
          '</div>' +
        '</li>';
    });
    html += '</ul>';
    container.innerHTML = html;

    // Pagination
    var pagHtml = '';
    if (totalPages > 1) {
      for (var i = 1; i <= totalPages; i++) {
        pagHtml += '<button' + (i === currentPage ? ' class="active"' : '') +
          ' onclick="goToPage(' + i + ')">' + i + '</button>';
      }
    }
    document.getElementById('pagination').innerHTML = pagHtml;
  }

  function goToPage(page) {
    currentPage = page;
    renderPosts();
    // Scroll to top of posts
    document.getElementById('filtered-posts').scrollIntoView({ behavior: 'smooth' });
  }

  function escapeHtml(str) {
    var div = document.createElement('div');
    div.appendChild(document.createTextNode(str));
    return div.innerHTML;
  }

  // Pre-select a tag from ?tag= and pre-fill ?q= when arriving from
  // home/post tag links or external links into search.
  var params = new URLSearchParams(window.location.search);
  var preselect = params.get('tag');
  if (preselect) {
    var el = document.querySelector('[data-tag="' + preselect + '"]');
    if (el) toggleTag(el);
  }
  var preQuery = params.get('q');
  if (preQuery) {
    document.getElementById('search-input').value = preQuery;
  }

  // Live-filter as the user types in the search input.
  document.getElementById('search-input').addEventListener('input', function() {
    currentPage = 1;
    renderPosts();
  });

  // Initial render
  renderPosts();
</script>
